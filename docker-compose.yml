services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: calendar_operator
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: calendar_operator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar_operator"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: